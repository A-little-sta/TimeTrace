<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D 模型查看器 - 岁月笺影</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(ellipse at center, #FDF8EF 0%, #FAF8F5 40%, #F0E8D8 100%);
      width: 100vw; height: 100vh; height: 100dvh;
      display: flex; flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    .header {
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.6); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(212,175,55,0.15);
      z-index: 10;
    }
    .header-title {
      font-size: 16px; font-weight: 700; color: #3D352B;
      letter-spacing: 2px;
    }
    .header-hint {
      font-size: 12px; color: #A39B90; letter-spacing: 1px;
    }
    .viewer-wrap {
      flex: 1; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    model-viewer {
      width: 100%; height: 100%;
      --poster-color: transparent;
      --progress-bar-color: #D4AF37;
      --progress-bar-height: 4px;
      --progress-mask: transparent;
    }
    .loading-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none; z-index: 5;
      transition: opacity 0.4s ease;
    }
    .loading-overlay.hidden { opacity: 0; }
    .loading-ring {
      width: 48px; height: 48px;
      border: 3px solid rgba(212,175,55,0.2);
      border-top-color: #D4AF37;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    .loading-text {
      font-size: 14px; color: #A39B90; letter-spacing: 2px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .controls-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; padding: 12px 20px;
      background: rgba(255,255,255,0.6); backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(212,175,55,0.15);
      z-index: 10;
    }
    .ctrl-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(212,175,55,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #3D352B;
      cursor: pointer; transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }
    .ctrl-btn:active {
      background: rgba(212,175,55,0.15); transform: scale(0.92);
    }
    .error-msg {
      color: #E74C3C; text-align: center; padding: 40px;
      font-size: 14px; line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">🧊 3D 模型查看器</span>
    <span class="header-hint">单指旋转 · 双指缩放</span>
  </div>

  <div class="viewer-wrap" id="viewerWrap">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-ring"></div>
      <div class="loading-text">加载模型中...</div>
    </div>
    <div class="error-msg" id="errorMsg" style="display:none;"></div>
  </div>

  <div class="controls-bar">
    <div class="ctrl-btn" id="btnReset" title="重置视角">↺</div>
    <div class="ctrl-btn" id="btnTop" title="俯视图">⬆</div>
    <div class="ctrl-btn" id="btnFront" title="前视图">◼</div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const modelUrl = params.get('url');

      if (!modelUrl) {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorMsg').textContent = '未提供模型 URL';
        return;
      }

      const fullUrl = modelUrl.startsWith('http') ? modelUrl : '/' + modelUrl;
      
      // 创建 model-viewer
      const viewer = document.createElement('model-viewer');
      viewer.setAttribute('src', fullUrl);
      viewer.setAttribute('auto-rotate', '');
      viewer.setAttribute('auto-rotate-delay', '3000');
      viewer.setAttribute('camera-controls', '');
      viewer.setAttribute('touch-action', 'pan-y');
      viewer.setAttribute('interaction-prompt', 'auto');
      viewer.setAttribute('environment-image', 'neutral');
      viewer.setAttribute('exposure', '1');
      viewer.setAttribute('shadow-intensity', '0.6');
      viewer.setAttribute('shadow-softness', '0.8');
      viewer.style.width = '100%';
      viewer.style.height = '100%';

      viewer.addEventListener('load', function() {
        document.getElementById('loadingOverlay').classList.add('hidden');
        setTimeout(function() {
          const overlay = document.getElementById('loadingOverlay');
          if (overlay) overlay.style.display = 'none';
        }, 400);
      });

      viewer.addEventListener('error', function(e) {
        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('errorMsg').textContent = '模型加载失败。\n请确认文件格式为 GLB/GLTF。\n' + (e.detail?.message || '');
      });

      document.getElementById('viewerWrap').insertBefore(viewer, document.getElementById('loadingOverlay'));

      // 控制按钮
      document.getElementById('btnReset').addEventListener('click', function() {
        viewer.cameraOrbit = '45deg 75deg auto';
        viewer.cameraTarget = 'auto auto auto';
      });
      document.getElementById('btnTop').addEventListener('click', function() {
        viewer.cameraOrbit = '0deg 0deg auto';
      });
      document.getElementById('btnFront').addEventListener('click', function() {
        viewer.cameraOrbit = '0deg 90deg auto';
      });
    })();
  </script>
</body>
</html>
